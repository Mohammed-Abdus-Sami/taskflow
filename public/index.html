<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Task Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <div class="logo-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 11l3 3L22 4" />
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
            </svg>
          </div>
          <span>TaskFlow</span>
        </div>
        <nav class="nav">
          <button class="nav-btn active" data-view="board">Board</button>
          <button class="nav-btn" data-view="list">List</button>
          <button class="nav-btn" data-view="stats">Dashboard</button>
        </nav>
        <button class="btn-primary" id="new-task-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          New Task
        </button>
      </div>
    </header>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="search-box">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input type="text" id="search-input" placeholder="Search tasks..." />
      </div>
      <div class="filters">
        <select id="filter-status" class="filter-select">
          <option value="">All Statuses</option>
          <option value="pending">Pending</option>
          <option value="in-progress">In Progress</option>
          <option value="completed">Completed</option>
        </select>
        <select id="filter-priority" class="filter-select">
          <option value="">All Priorities</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <select id="filter-category" class="filter-select">
          <option value="">All Categories</option>
        </select>
        <select id="sort-by" class="filter-select">
          <option value="created_at-desc">Newest First</option>
          <option value="created_at-asc">Oldest First</option>
          <option value="due_date-asc">Due Date (Soonest)</option>
          <option value="priority-desc">Priority (High to Low)</option>
          <option value="title-asc">Title (A-Z)</option>
        </select>
      </div>
    </div>

    <!-- Main Content -->
    <main class="main">
      <!-- Board View -->
      <div id="board-view" class="view active">
        <div class="board">
          <div class="board-column" data-status="pending">
            <div class="column-header">
              <h2>Pending</h2>
              <span class="column-count" id="count-pending">0</span>
            </div>
            <div class="column-body" id="col-pending"></div>
          </div>
          <div class="board-column" data-status="in-progress">
            <div class="column-header">
              <h2>In Progress</h2>
              <span class="column-count" id="count-in-progress">0</span>
            </div>
            <div class="column-body" id="col-in-progress"></div>
          </div>
          <div class="board-column" data-status="completed">
            <div class="column-header">
              <h2>Completed</h2>
              <span class="column-count" id="count-completed">0</span>
            </div>
            <div class="column-body" id="col-completed"></div>
          </div>
        </div>
      </div>

      <!-- List View -->
      <div id="list-view" class="view">
        <table class="task-table">
          <thead>
            <tr>
              <th>Title</th>
              <th>Status</th>
              <th>Priority</th>
              <th>Category</th>
              <th>Due Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="task-list-body"></tbody>
        </table>
      </div>

      <!-- Stats View -->
      <div id="stats-view" class="view">
        <div class="stats-grid" id="stats-grid"></div>
        <div class="stats-charts">
          <div class="chart-card">
            <h3>Tasks by Priority</h3>
            <div id="priority-chart" class="bar-chart"></div>
          </div>
          <div class="chart-card">
            <h3>Tasks by Category</h3>
            <div id="category-chart" class="bar-chart"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Task Modal -->
  <div class="modal-overlay" id="task-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">New Task</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <form id="task-form">
        <input type="hidden" id="task-id" />
        <div class="form-group">
          <label for="title">Title *</label>
          <input type="text" id="title" required placeholder="Enter task title" />
        </div>
        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" rows="3" placeholder="Enter task description"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="status">Status</label>
            <select id="status">
              <option value="pending">Pending</option>
              <option value="in-progress">In Progress</option>
              <option value="completed">Completed</option>
            </select>
          </div>
          <div class="form-group">
            <label for="priority">Priority</label>
            <select id="priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="category">Category</label>
            <input type="text" id="category" value="general" placeholder="e.g. Development" />
          </div>
          <div class="form-group">
            <label for="due_date">Due Date</label>
            <input type="date" id="due_date" />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-secondary" id="modal-cancel">Cancel</button>
          <button type="submit" class="btn-primary">Save Task</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Task Detail Modal -->
  <div class="modal-overlay" id="detail-modal">
    <div class="modal modal-large">
      <div class="modal-header">
        <h2>Task Details</h2>
        <button class="modal-close" id="detail-close">&times;</button>
      </div>
      <div class="detail-content" id="detail-content"></div>
      <div class="comments-section">
        <h3>Comments</h3>
        <div id="comments-list"></div>
        <div class="comment-form">
          <textarea id="comment-input" rows="2" placeholder="Add a comment..."></textarea>
          <button class="btn-primary" id="add-comment-btn">Add Comment</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
